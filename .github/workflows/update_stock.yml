name: Update Stock Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # 這是標準的 GitHub Actions cron 格式，這樣寫最穩
    - cron: '0,15,30,45 1-7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install yfinance requests pandas
          
      - name: Run script
        run: python weiyu_stock.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data.js
          # 關鍵：這裡加入判斷，有資料變化才 commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新數據" && git push)
