name: Update Stock Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # 台灣時間 09:00-15:00，轉換為 UTC 為 01:00-07:00
    - cron: '0,15,30,45 1-7 * * 1-5'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # 建議升級到 v4
      - name: Set up Python
        uses: actions/setup-python@v5 # 建議升級到 v5
        with:
          python-version: '3.10' # 建議使用較穩定的版本
      - name: Install dependencies
        run: pip install yfinance requests pandas
      - name: Run script
        run: python weiyu_stock.py
      - name: Commit and push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data.js
          # 檢查是否有變更才 commit，避免無效 commit 導致失敗
          git diff --quiet && git diff --staged --quiet || (git commit -m "自動更新數據" && git push)
