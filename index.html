<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>台股板塊分析</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="data.js"></script>
    <style>
        body { background-color: #0d1117; color: #fff; font-family: sans-serif; padding: 20px; }
        #update-time { color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        .search-container { position: relative; width: 100%; max-width: 650px; margin-bottom: 20px; display: flex; gap: 10px; }
        #search-box { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #161b22; color: white; }
        #suggestions { position: absolute; top: 45px; width: 100%; background: #222; border: 1px solid #444; z-index: 1000; display: none; max-height: 200px; overflow-y: auto; border-radius: 0 0 8px 8px; }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #333; }
        .suggestion-item:hover { background: #30363d; }
        #main-chart { width: 100%; height: 500px; background: #161b22; border-radius: 8px; }
        #details-panel { background: #1f242c; padding: 20px; margin-top: 20px; border-radius: 8px; display: none; }
        .btn-download { padding: 10px 20px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; white-space: nowrap; }
        .btn-download:hover { background: #2ea043; }
    </style>
</head>
<body>
    <h1>📊 台股板塊分析</h1>
    <div id="update-time">資料更新中...</div>
    <h2>虧錢別找我算帳~</h2>
    
    <div class="search-container">
        <input type="text" id="search-box" placeholder="🔍 輸入代號或名稱..." oninput="showSuggestions()">
        <button class="btn-download" onclick="downloadAllExcel()">📥 下載全部資訊 Excel</button>
        <div id="suggestions"></div>
    </div>

    <div id="main-chart"></div>

    <div id="details-panel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="panel-title">板塊細節</h2>
            <button class="btn-download" onclick="downloadCurrentExcel()">📥 下載此板塊 Excel</button>
        </div>
        <table border="1" style="color:white; width:100%; text-align:left; border-collapse: collapse; border-color: #444;">
            <thead><tr style="background:#30363d;">
                <th>名稱 (代號)</th><th>買單成交</th><th>賣單成交</th><th>收盤價</th><th>漲跌幅</th><th>法人預估買超</th><th>資金動能</th>
            </tr></thead>
            <tbody id="stock-list"></tbody>
        </table>
    </div>

    <script>
        var currentSector = null;

        // 共用的下載邏輯，自動加入 (名稱)_YYYYMMDDHHMM 格式
        function downloadExcel(data, baseName) {
            const now = new Date();
            const d = now.getFullYear().toString() + 
                      (now.getMonth() + 1).toString().padStart(2, '0') + 
                      now.getDate().toString().padStart(2, '0') + 
                      now.getHours().toString().padStart(2, '0') + 
                      now.getMinutes().toString().padStart(2, '0');
            
            const fileName = `(${baseName})_${d}.xlsx`;
            
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "StockData");
            XLSX.writeFile(wb, fileName);
        }

        // 下載當前檢視的板塊
        function downloadCurrentExcel() {
            if (!currentSector) return;
            const data = currentSector.details.map(s => ({
                "板塊名稱": currentSector.name, "股票名稱": s.display_name, "代號": s.name,
                "買單成交": s.buy_vol, "賣單成交": s.sell_vol, "收盤價": s.price,
                "漲跌幅 (%)": s.change, "法人預估買超": s.buy_power, "資金動能": (s.buy_vol + s.sell_vol)
            }));
            downloadExcel(data, currentSector.name);
        }

        // 下載全部板塊資訊
        function downloadAllExcel() {
            let allData = [];
            stockData.forEach(sector => {
                sector.details.forEach(s => {
                    allData.push({
                        "板塊名稱": sector.name, "股票名稱": s.display_name, "代號": s.name,
                        "買單成交": s.buy_vol, "賣單成交": s.sell_vol, "收盤價": s.price,
                        "漲跌幅 (%)": s.change, "法人預估買超": s.buy_power, "資金動能": (s.buy_vol + s.sell_vol)
                    });
                });
            });
            downloadExcel(allData, "全市場板塊總表");
        }

        // 1. 自動顯示更新時間
        fetch('data.js', { method: 'HEAD' }).then(response => {
            const date = new Date(response.headers.get('Last-Modified'));
            document.getElementById('update-time').innerText = "🕒 最後更新時間: " + date.toLocaleString();
        }).catch(() => { document.getElementById('update-time').innerText = "🕒 資料來源更新中..."; });

        // 2. 初始化圖表
        var myChart = echarts.init(document.getElementById('main-chart'), 'dark');
        function renderChart(data) {
            myChart.setOption({
                xAxis: { name: '資金動能 (成交熱度)' }, 
                yAxis: { name: '板塊漲跌幅 (%)' },
                series: [{
                    type: 'scatter',
                    data: data.map(item => {
                        let avgChange = item.details.reduce((a, b) => a + b.change, 0) / item.details.length;
                        return { value: [item.x, avgChange], name: item.name, raw: item, itemStyle: { color: avgChange >= 0 ? '#ff4d4f' : '#52c41a' } };
                    }),
                    symbolSize: 80,
                    label: { show: true, formatter: p => p.name + '\n' + p.data.value[1].toFixed(2) + '%', color: '#fff', fontSize: 12 }
                }]
            }, true);
        }

        // 3. 顯示細節
        function showDetails(sector) {
            currentSector = sector;
            document.getElementById('panel-title').innerText = "板塊: " + sector.name;
            var list = document.getElementById('stock-list');
            list.innerHTML = "";
            sector.details.forEach(s => {
                list.innerHTML += `<tr>
                    <td>${s.display_name} (${s.name})</td>
                    <td>${s.buy_vol.toLocaleString()}</td>
                    <td>${s.sell_vol.toLocaleString()}</td>
                    <td>${s.price}</td>
                    <td style="color: ${s.change >= 0 ? '#ff4d4f' : '#52c41a'}">${s.change}%</td>
                    <td>${s.warning} ${s.buy_power.toLocaleString()}</td>
                    <td>${(s.buy_vol + s.sell_vol).toLocaleString()}</td>
                </tr>`;
            });
            document.getElementById('details-panel').style.display = 'block';
        }

        // 搜尋功能
        function showSuggestions() {
            var query = document.getElementById('search-box').value.toLowerCase();
            var sugDiv = document.getElementById('suggestions');
            sugDiv.innerHTML = "";
            if (!query) { sugDiv.style.display = "none"; renderChart(stockData); return; }
            var matches = [];
            stockData.forEach(sector => {
                sector.details.forEach(s => {
                    if (s.name.toLowerCase().includes(query) || s.display_name.toLowerCase().includes(query))
                        matches.push({ ...s, sectorObj: sector });
                });
            });
            matches.forEach(m => {
                var div = document.createElement("div");
                div.className = "suggestion-item";
                div.innerHTML = `<strong>${m.name} ${m.display_name}</strong>`;
                div.onclick = () => { renderChart([m.sectorObj]); showDetails(m.sectorObj); sugDiv.style.display = "none"; };
                sugDiv.appendChild(div);
            });
            sugDiv.style.display = matches.length > 0 ? "block" : "none";
        }

        renderChart(stockData);
        myChart.on('click', p => showDetails(p.data.raw));
    </script>
</body>
</html>
